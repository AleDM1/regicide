<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aledm1 – Games</title>

  <!-- Open Graph / WhatsApp / Social preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://aledm1.github.io/regicide/" />
  <meta property="og:title"       content="Regicide" />
  <meta property="og:description" content="Overthrow the corrupted monarchs. A cooperative card game you can play in your browser." />
  <meta property="og:image"       content="https://aledm1.github.io/regicide/regicide/logo_regicide.png" />
  <meta property="og:image:alt"   content="Regicide logo" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      content="https://aledm1.github.io/regicide/regicide/logo_regicide.png" />
  <style>
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
    }
    .hub {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }
    h1 { font-size: 2rem; color: #d4a017; letter-spacing: .15em; }
    .game-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 32px 48px;
      border: 2px solid #d4a017;
      border-radius: 12px;
      background: #161b22;
      text-decoration: none; color: inherit;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 24px rgba(212,160,23,.2);
    }
    .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(212,160,23,.4); }
    .game-card .icon { font-size: 3rem; }
    .game-card .name { font-size: 1.3rem; font-weight: 700; letter-spacing: .1em; }
    .game-card .desc { font-size: .85rem; color: #8b949e; }
  </style>
</head>
<body>
  <div class="hub">
    <h1>⚔ aledm1 Games</h1>
    <a class="game-card" href="./regicide/">
      <span class="icon">🃏</span>
      <span class="name">REGICIDE</span>
      <span class="desc">Cooperative card game vs corrupted monarchs</span>
    </a>
  </div>
</body>
</html>
